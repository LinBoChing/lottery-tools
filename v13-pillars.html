<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>吸金穩贏模組</title>

<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="manifest" href="manifest-pillars.json">
<link rel="icon" href="caishen-192.png">
<link rel="apple-touch-icon" href="caishen-192.png">

<style>
body{
  margin:0;
  background:linear-gradient(180deg,#080808,#141414);
  color:#f5f1e8;
  font-family:"Microsoft JhengHei";
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.title{
  font-size:28px;
  font-weight:900;
  color:#f3d36a;
}

.sub{
  color:#c8b98a;
  margin-bottom:16px;
}

.card{
  background:#1a1a1a;
  border:1px solid rgba(212,175,55,0.3);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

textarea{
  width:100%;
  min-height:200px;
  background:#111;
  color:#fff;
  border-radius:10px;
  border:1px solid #444;
  padding:10px;
}

button{
  background:linear-gradient(180deg,#3c2d09,#c99b1f);
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  margin-top:10px;
}

.result{
  margin-top:10px;
  line-height:1.8;
  color:#ffe9a8;
}
</style>

</head>

<body>
<div class="wrap">

<div class="title">吸金穩贏模組</div>
<div class="sub">BLACK GOLD EDITION｜539 AI分析工具</div>

<div class="card">
<textarea id="input" placeholder="貼上百期開獎號碼..."></textarea>
<button onclick="run()">開始分析</button>
</div>

<div class="card">
<div id="output" class="result">尚未產生結果</div>
</div>

</div>

<script>
function run(){
  document.getElementById("output").innerHTML = "分析完成（示範版已套用黑金UI）";
}
</script>

</body>
</html>
